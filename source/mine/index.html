<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIPEN ONLINE - Mine</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="passcode-overlay">
    <div class="passcode-box pixel-border">
      <div class="passcode-title">VIPEN ONLINE</div>
      <div class="passcode-subtitle">Enter Passcode to Continue</div>
      <input type="password" id="passcode-input" class="passcode-input" placeholder="····" autocomplete="off">
      <br>
      <button id="passcode-submit" class="passcode-submit">ENTER</button>
      <div id="passcode-error" class="passcode-error">Invalid Passcode</div>
    </div>
  </div>

  <div id="main-app">
    <nav>
      <a class="nav-logo" href="/">VP</a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link active" href="/mine/">Mine</a>
        <a class="nav-link" href="/life/">Life</a>
        <a class="nav-link" href="/chat/">Chat</a>
        <a class="nav-link" href="/more/">More</a>
      </div>
      <button class="theme-toggle" id="theme-toggle">☀/☾</button>
    </nav>

    <div class="container page">
      <div class="section">
        <h2 class="section-title">ABOUT ME</h2>
        <div style="text-align: center; margin-bottom: 40px;">
          <div style="width: 120px; height: 120px; background: var(--bg-card); border: 4px solid var(--accent); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 56px;">
            👤
          </div>
          <h3 style="font-family: 'Press Start 2P', monospace; font-size: 16px; margin-bottom: 8px;">VIPEN</h3>
          <p style="font-size: 22px; color: var(--text-secondary);">Designer & Developer</p>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">STATS</h2>
        <div class="stats-grid">
          <div class="stat-card pixel-border">
            <span class="stat-value">42</span>
            <span class="stat-label">Projects</span>
          </div>
          <div class="stat-card pixel-border">
            <span class="stat-value">128</span>
            <span class="stat-label">Posts</span>
          </div>
          <div class="stat-card pixel-border">
            <span class="stat-value">1.2K</span>
            <span class="stat-label">Likes</span>
          </div>
          <div class="stat-card pixel-border">
            <span class="stat-value">365</span>
            <span class="stat-label">Days</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">SKILLS</h2>
        <div>
          <span class="tag">UI Design</span>
          <span class="tag">HTML/CSS</span>
          <span class="tag">JavaScript</span>
          <span class="tag">React</span>
          <span class="tag">Node.js</span>
          <span class="tag">Figma</span>
          <span class="tag">Creative Code</span>
          <span class="tag">Pixel Art</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/main.js"></script>
</body>
</html>
