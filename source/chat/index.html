<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIPEN ONLINE - Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="passcode-overlay" id="passcode-overlay">
    <div class="passcode-box">
      <div class="passcode-title">VIPEN ONLINE</div>
      <div class="passcode-subtitle">Enter Access Code</div>
      <input type="password" class="passcode-input" id="passcode-input" placeholder="····" autocomplete="off">
      <button class="passcode-btn" id="passcode-btn">ENTER</button>
      <div class="passcode-error" id="passcode-error">Invalid Code</div>
    </div>
  </div>
  <div id="main-app" style="display:none;opacity:0;transform:translateY(12px);transition:opacity 0.6s ease,transform 0.6s ease;">
    <nav class="navbar">
      <a class="navbar-logo" href="/">VP</a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/mine/">Mine</a>
        <a class="nav-link" href="/life/">Life</a>
        <a class="nav-link active" href="/chat/">Chat</a>
        <a class="nav-link" href="/disc/">Disc</a>
        <a class="nav-link" href="/more/">More</a>
      </div>
      <button class="theme-toggle">☾</button>
    </nav>
    <div class="container page">
      <div class="section fade-in">
        <div class="section-label">Community</div>
        <h2 class="section-title"><span>MESSAGE BOARD</span></h2>
      </div>
      <div class="chat-box fade-in">
        <div class="chat-icon">💬</div>
        <div class="chat-title">Coming Soon</div>
        <div class="chat-desc">Text · Image · Emoji</div>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-logo">VIPEN ONLINE</div>
      <div class="footer-text">© 2024 All Rights Reserved</div>
    </footer>
  </div>
  <script src="/main.js"></script>
</body>
</html>
