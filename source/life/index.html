<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIPEN ONLINE - Life</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="passcode-overlay" id="passcode-overlay">
    <div class="passcode-box">
      <div class="passcode-title">VIPEN ONLINE</div>
      <div class="passcode-subtitle">Enter Access Code</div>
      <input type="password" class="passcode-input" id="passcode-input" placeholder="····" autocomplete="off">
      <button class="passcode-btn" id="passcode-btn">ENTER</button>
      <div class="passcode-error" id="passcode-error">Invalid Code</div>
    </div>
  </div>
  <div id="main-app" style="display:none;opacity:0;transform:translateY(12px);transition:opacity 0.6s ease,transform 0.6s ease;">
    <nav class="navbar">
      <a class="navbar-logo" href="/">VP</a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/mine/">Mine</a>
        <a class="nav-link active" href="/life/">Life</a>
        <a class="nav-link" href="/chat/">Chat</a>
        <a class="nav-link" href="/more/">More</a>
      </div>
      <button class="theme-toggle">☾</button>
    </nav>
    <div class="container page">
      <!-- Gallery -->
      <div class="section fade-in">
        <div class="section-label">Gallery</div>
        <h2 class="section-title"><span>LIFE</span></h2>
      </div>
      <div class="gallery-grid" style="margin-bottom:64px;">
        <div class="gallery-item fade-in">🏔️<span class="gallery-label">Mountain</span></div>
        <div class="gallery-item fade-in"><span class="gallery-label">Ocean</span></div>
        <div class="gallery-item fade-in">🌅<span class="gallery-label">Sunset</span></div>
        <div class="gallery-item fade-in">🏙️<span class="gallery-label">City</span></div>
        <div class="gallery-item fade-in"><span class="gallery-label">Music</span></div>
        <div class="gallery-item fade-in">📷<span class="gallery-label">Photo</span></div>
      </div>
      <!-- Videos -->
      <div class="section fade-in">
        <div class="section-label">Watch</div>
        <h2 class="section-title"><span>VIDEOS</span></h2>
      </div>
      <div class="video-container fade-in">
        <div class="video-placeholder">▶</div>
        <div class="video-info"><div class="video-title">Featured Video</div></div>
      </div>
      <div class="video-container fade-in">
        <div class="video-placeholder">▶</div>
        <div class="video-info"><div class="video-title">Design Process</div></div>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-logo">VIPEN ONLINE</div>
      <div class="footer-text">© 2024 All Rights Reserved</div>
    </footer>
  </div>
  <script src="/main.js"></script>
</body>
</html>
